<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="AgriPresyo — Real-time Philippine agricultural commodity price tracking. Compare crop prices, find vendors, and manage your market budget." />
  <meta name="theme-color" content="#22c55e" />
  <title>AgriPresyo™ - Agri-Fintech Intelligence</title>

  <!-- Prevent dark mode flash — apply theme class BEFORE any rendering -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && true)) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Fonts: preconnect first, then load with display=swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="/AgriPresyo_logoFinal.webp" as="image" type="image/webp" fetchpriority="high">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      color: #18181b;
    }

    .dark body {
      background-color: #000000;
      color: #f4f4f5;
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #09090b;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
