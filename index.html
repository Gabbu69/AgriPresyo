<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="AgriPresyo — Real-time Philippine agricultural commodity price tracking. Compare crop prices, find vendors, and manage your market budget." />
  <meta name="theme-color" content="#22c55e" />
  <title>AgriPresyo - Agri-Fintech Intelligence</title>
  <!-- Tailwind CSS is now built via PostCSS (see tailwind.config.js) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="/AgriPresyo_logoFinal.webp" as="image" type="image/webp">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      /* Default to light mode (will be overridden by dark class) */
      background-color: #fafafa;
      /* zinc-50 */
      color: #18181b;
      /* zinc-900 */
    }

    /* Dark mode overrides applied when 'dark' class is present on html */
    .dark body {
      background-color: #000000;
      /* black */
      color: #f4f4f5;
      /* zinc-100 */
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #09090b;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }

    @keyframes marquee {
      0% {
        transform: translate3d(0, 0, 0);
      }

      100% {
        transform: translate3d(-50%, 0, 0);
      }
    }

    .animate-marquee {
      display: flex;
      animation: marquee var(--ticker-duration, 200s) linear infinite;
      will-change: transform;
    }

    .ticker-mask:hover .animate-marquee {
      animation-play-state: paused;
    }

    .ticker-mask {
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
