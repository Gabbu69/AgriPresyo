<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description"
    content="AgriPresyo — Real-time Philippine agricultural commodity price tracking. Compare crop prices, find vendors, and manage your market budget." />
  <meta name="theme-color" content="#22c55e" />
  <title>AgriPresyo&#8482; - Agri-Fintech Intelligence</title>

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/webp" href="/AgriPresyo_logoFinal.webp" />
  <link rel="icon" type="image/png" href="/AgriPresyo_logoFinal.png" />
  <link rel="apple-touch-icon" href="/AgriPresyo_logoFinal.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agripresyo-dusky.vercel.app/" />
  <meta property="og:title" content="AgriPresyo&#8482; — Know the Price Before You Buy" />
  <meta property="og:description" content="Real-time Philippine agricultural commodity price tracking. Compare crop prices, find vendors, and make smarter market decisions." />
  <meta property="og:image" content="https://agripresyo-dusky.vercel.app/AgriPresyo_logoFinal.png" />
  <meta property="og:image:width" content="326" />
  <meta property="og:image:height" content="326" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="AgriPresyo&#8482; — Know the Price Before You Buy" />
  <meta name="twitter:description" content="Real-time Philippine agricultural commodity price tracking for farmers, vendors, and consumers." />
  <meta name="twitter:image" content="https://agripresyo-dusky.vercel.app/AgriPresyo_logoFinal.png" />

  <!-- Prevent dark mode flash — apply theme class BEFORE any rendering -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && true)) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Fonts: preconnect first, then load with display=swap (added weight 900 for font-black) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="/AgriPresyo_logoFinal.webp" as="image" type="image/webp" fetchpriority="high">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      color: #18181b;
    }

    .dark body {
      background-color: #000000;
      color: #f4f4f5;
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>

</html>
